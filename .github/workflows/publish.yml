name: Publish

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.x'

      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun
          key: ubuntu-bun-1.3.x-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ubuntu-bun-1.3.x-
            ubuntu-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Publish
        run: npm publish --access public --provenance
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  verify-tag:
    name: Verify tag matches version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check tag matches package.json
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          JSON_VERSION=$(node -e "console.log(require('./package.json').version)")
          if [ "$TAG_VERSION" != "$JSON_VERSION" ]; then
            echo "Tag version $TAG_VERSION != package.json version $JSON_VERSION"
            exit 1
          fi
          echo "Tag $TAG_VERSION matches package.json $JSON_VERSION"