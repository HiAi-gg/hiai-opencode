name: release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: build & verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x

      - name: Setup Node.js (for npm pack)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run typecheck
        run: bun run typecheck

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build

      - name: Pack tarball
        run: npm pack

      - name: Check bundle size
        run: npm run check:bundle-size

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.tgz

  publish-npm:
    name: publish to npm
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Publish to npm (with provenance, fallback to no-provenance on EOTP)
        id: publish
        run: |
          if npm publish --access public --provenance 2>&1 | tee /tmp/publish.log; then
            echo "Published with provenance"
          else
            if grep -q "EOTP" /tmp/publish.log; then
              echo "::warning::NPM_TOKEN requires 2FA — retrying without --provenance. Replace with an Automation-type token to enable provenance. See docs/hiai-opencode/release-process.md"
              npm publish --access public --no-provenance
            else
              exit 1
            fi
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
