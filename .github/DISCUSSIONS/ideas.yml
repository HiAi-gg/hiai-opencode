name: Ideas
description: Feature requests and brainstorming
title: "[Idea] "
labels: ["idea", "needs-review"]
body:
  - type: textarea
    id: feature-description
    attributes:
      label: Feature Description
      description: Describe the feature or change you're proposing
      placeholder: A clear and concise description of the feature
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem it Solves
      description: What problem does this solve? Why is this important?
      placeholder: Explain the problem or pain point
    validations:
      required: true
  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: How should it work? Include relevant details, examples, or mockups
      placeholder: Describe your proposed solution
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What else did you consider? What are the tradeoffs?
      placeholder: List alternative approaches and their tradeoffs
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, links, or notes
      placeholder: Add any extra context here
    validations:
      required: false
