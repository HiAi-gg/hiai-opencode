<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kami Deck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f5f0e8;
      --ink: #1a1a2e;
      --accent: #1e3a5f;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: Georgia, 'Times New Roman', serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-body);
      color: var(--ink);
      background: var(--bg);
      line-height: 1.6;
    }
    .slide {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 10vh 8vw;
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 { font-family: var(--font-display); font-size: 3.5rem; font-weight: 700; line-height: 1.1; margin-bottom: 1rem; }
    h2 { font-family: var(--font-display); font-size: 2.5rem; font-weight: 400; font-style: italic; margin-bottom: 1.5rem; color: var(--accent); }
    p { font-size: 1.25rem; margin-bottom: 1rem; max-width: 40em; }
    hr { border: none; border-top: 1px solid var(--accent); margin: 2rem 0; opacity: 0.3; }
    nav { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); display: flex; gap: 0.5rem; }
    nav a { text-decoration: none; color: var(--accent); font-size: 0.9rem; padding: 0.25rem 0.5rem; border: 1px solid var(--accent); border-radius: 2px; }
    .kbd { font-family: monospace; font-size: 0.8rem; opacity: 0.5; }
  </style>
</head>
<body>

  <section class="slide" id="slide-1">
    <h1>Title Slide</h1>
    <p>Subtitle or description goes here.</p>
    <hr />
    <p class="kbd">← → navigate</p>
  </section>

  <section class="slide" id="slide-2">
    <h2>Section Title</h2>
    <p>Body text for this slide. The warm parchment palette and ink-blue accent create a calm, editorial feel.</p>
    <p>Use this template with the <code>kami/</code> design system for consistent styling.</p>
  </section>

  <section class="slide" id="slide-3">
    <h2>Closing</h2>
    <p>Thank you.</p>
  </section>

  <nav>
    <a href="#slide-1">1</a>
    <a href="#slide-2">2</a>
    <a href="#slide-3">3</a>
  </nav>

  <script>
    document.addEventListener('keydown', e => {
      const slides = document.querySelectorAll('.slide');
      const current = Array.from(slides).find(s => s.getBoundingClientRect().top >= 0);
      const idx = current ? Array.from(slides).indexOf(current) : 0;
      if (e.key === 'ArrowRight' && idx < slides.length - 1) slides[idx + 1].scrollIntoView({ behavior: 'smooth' });
      if (e.key === 'ArrowLeft' && idx > 0) slides[idx - 1].scrollIntoView({ behavior: 'smooth' });
    });
  </script>
</body>
</html>
